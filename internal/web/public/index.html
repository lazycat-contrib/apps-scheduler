<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>应用定时管家 | Meow App Operator</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-content">
      <a href="/" class="logo">
        <div class="logo-icon">
          <i class="ri-timer-flash-line"></i>
        </div>
        <div class="logo-text" data-i18n="app_name">应用定时管家</div>
      </a>

      <div class="header-actions">
        <!-- Theme Toggle -->
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="切换主题">
          <i class="ri-sun-line icon-sun"></i>
          <i class="ri-moon-line icon-moon"></i>
        </button>
        <!-- Language Selector -->
        <select class="form-select" id="langSelector" style="width: auto; padding: 6px 32px 6px 12px; font-size: 12px;" onchange="setLang(this.value)">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
        </select>
        <a href="/settings" class="btn btn-secondary btn-icon" title="设置" aria-label="设置">
          <i class="ri-settings-3-line"></i>
        </a>
        <div class="user-info" id="userInfo">
          <div class="user-avatar" id="userAvatar">-</div>
          <div>
            <div class="user-name" id="userName">加载中...</div>
            <div class="user-role" id="userRole">-</div>
          </div>
        </div>
        <a href="/logout" class="btn btn-secondary btn-sm">
          <i class="ri-logout-box-line"></i>
          <span data-i18n="logout">登出</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <div class="page-title" data-i18n="control_center">控制中心</div>
      <h1 class="page-heading" data-i18n="app_name">应用定时管家</h1>

      <!-- Apps Section -->
      <section class="section" id="appsSection">
        <div class="section-header">
          <h2 class="section-title" data-i18n="installed_apps">已安装应用</h2>
          <button class="btn btn-secondary btn-sm" onclick="refreshApps()">
            <i class="ri-refresh-line"></i>
            <span data-i18n="refresh">刷新</span>
          </button>
        </div>
        <div class="grid grid-3" id="appsList">
          <div class="loading">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </section>

      <!-- Schedules Section -->
      <section class="section" id="schedulesSection">
        <div class="section-header">
          <h2 class="section-title" data-i18n="scheduled_tasks">定时任务</h2>
          <button class="btn btn-primary" onclick="openScheduleModal()">
            <i class="ri-add-line"></i>
            <span data-i18n="new_task">新建任务</span>
          </button>
        </div>
        <div class="grid grid-2" id="schedulesList">
          <div class="loading">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Schedule Modal -->
  <div class="modal-overlay" id="scheduleModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="scheduleModalTitle">新建定时任务</h3>
        <button class="modal-close" onclick="closeScheduleModal()">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <form id="scheduleForm" onsubmit="saveSchedule(event)">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" data-i18n="task_name">任务名称</label>
            <input type="text" class="form-input" id="scheduleName" data-i18n-placeholder="task_name_placeholder" placeholder="例如：晚间关闭下载器" required>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="select_app">选择应用</label>
            <select class="form-select" id="scheduleApp" required>
              <option value="">请选择应用...</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="operation">操作</label>
            <select class="form-select" id="scheduleOperation" required>
              <option value="resume" data-i18n="operation_resume">恢复应用</option>
              <option value="pause" data-i18n="operation_pause">休眠应用</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="exec_time">执行时间</label>
            <div class="time-input-group">
              <input type="number" class="form-input time-input" id="scheduleHour" min="0" max="23" value="0" required>
              <span class="time-separator">:</span>
              <input type="number" class="form-input time-input" id="scheduleMinute" min="0" max="59" value="0" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="repeat_days">重复日期</label>
            <div class="day-picker" id="dayPicker">
              <!-- Will be generated by JS -->
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeScheduleModal()" data-i18n="cancel">取消</button>
          <button type="submit" class="btn btn-primary" data-i18n="save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/static/js/app.js"></script>
  <script>
    // Initialize language selector
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('langSelector').value = currentLang;
      initDayPicker();
    });

    function initDayPicker() {
      const picker = document.getElementById('dayPicker');
      const days = t('days');
      picker.innerHTML = days.map((day, i) => `
        <label class="day-picker-item">
          <input type="checkbox" name="weekDays" value="${i}">
          <span class="day-picker-label">${day}</span>
        </label>
      `).join('');
    }

    // Re-init day picker when language changes
    const originalSetLang = setLang;
    setLang = function(lang) {
      originalSetLang(lang);
      initDayPicker();
      document.getElementById('langSelector').value = lang;
      loadApps();
      loadSchedules();
    };
  </script>
</body>
</html>
